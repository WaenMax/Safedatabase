server:
  port: 8080

agent:
  llm:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
    siliconflow:
      api-key: ${SILICONFLOW_API_KEY:}
      base-url: ${SILICONFLOW_BASE_URL:https://api.siliconflow.cn/v1}
      model: ${SILICONFLOW_MODEL:deepseek-ai/DeepSeek-V3.2}

spring:
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/data_security?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      encoding: UTF-8

