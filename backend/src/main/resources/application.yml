server:
  port: 8080

agent:
  llm:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
    siliconflow:
      api-key: ${SILICONFLOW_API_KEY:}
      base-url: ${SILICONFLOW_BASE_URL:https://api.siliconflow.cn/v1}
      model: ${SILICONFLOW_MODEL:deepseek-ai/DeepSeek-V3.2}

spring:
  datasource:
    url: jdbc:h2:mem:data_security;MODE=MSSQLServer;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      encoding: UTF-8
  h2:
    console:
      enabled: true
      path: /h2-console

---
spring:
  config:
    activate:
      on-profile: sqlserver
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=data_security;encrypt=true;trustServerCertificate=true
    username: sa
    password: YourStrong@Passw0rd
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  sql:
    init:
      mode: never

